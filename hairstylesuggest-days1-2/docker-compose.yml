version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: hairstylesuggest_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: @Adminuser007
      MYSQL_DATABASE: hairstylesuggest
      MYSQL_USER: langson
      MYSQL_PASSWORD: @Adminuser007
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --sql-mode=STRICT_TRANS_TABLES,NO_ZERO_DATE,NO_ZERO_IN_DATE,ERROR_FOR_DIVISION_BY_ZERO
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mysql_data:
    driver: local
